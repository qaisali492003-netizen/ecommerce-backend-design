{% extends 'shop/base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px; border-radius: 8px;">
        <div class="card-body p-4 p-md-5">
            <h3 class="fw-bold text-center mb-4">Create Account</h3>
            
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger x-small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-3">Register</button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account?</span>
                <a href="{% url 'login' %}" class="text-primary small fw-bold text-decoration-none">Sign in</a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling Django's default form inputs to match Bootstrap */
    input[type="text"], input[type="password"], input[type="email"] {
        display: block; width: 100%; padding: 0.5rem 0.75rem;
        font-size: 1rem; line-height: 1.5; color: #1c1c1c;
        background-color: #fff; border: 1px solid #dee2e7;
        border-radius: 6px; transition: border-color .15s ease-in-out;
    }
    input:focus { border-color: #0d6efd; outline: 0; }
</style>
{% endblock %}
