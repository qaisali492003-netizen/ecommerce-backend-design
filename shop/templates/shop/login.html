{% extends 'shop/base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px; border-radius: 8px;">
        <div class="card-body p-4 p-md-5">
            <h3 class="fw-bold text-center mb-4">Sign in</h3>
            
            {% if form.errors %}
                <div class="alert alert-danger small p-2 text-center">Your username or password was incorrect.</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login</button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small">Don't have an account?</span>
                <a href="{% url 'signup' %}" class="text-primary small fw-bold text-decoration-none">Register now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
